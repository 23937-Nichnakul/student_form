<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฟอร์มเก็บข้อมูลนักเรียน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- General Reset & Base Style --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 800px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            padding: 40px;
        }

        /* --- Header Form --- */
        .form-header {
            text-align: center;
            margin-bottom: 35px;
            border-bottom: 3px solid #f0fdf4;
            padding-bottom: 20px;
        }

        .form-header h2 {
            color: #0369a1;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-header p {
            color: #64748b;
            font-size: 14px;
        }

        /* --- Form Sections & Grid --- */
        fieldset {
            border: none;
            margin-bottom: 30px;
        }

        legend {
            font-size: 18px;
            font-weight: 600;
            color: #0284c7;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            width: 100%;
            border-bottom: 2px solid #e0f2fe;
            padding-bottom: 8px;
        }

        /* จัด Grid สำหรับแบ่งคอลัมน์ */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .full-width {
            grid-column: span 2;
        }

        /* --- Form Controls --- */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            color: #334155;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="url"],
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            color: #1e293b;
            background-color: #f8fafc;
            outline: none;
            transition: all 0.3s ease;
        }

        /* เอฟเฟกต์ตอนโฟกัสกล่องกรอกข้อมูล */
        input:focus,
        select:focus,
        textarea:focus {
            border-color: #38bdf8;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }

        /* สำหรับปุ่มเลือกสี */
        input[type="color"] {
            border: 1.5px solid #cbd5e1;
            border-radius: 8px;
            width: 80px;
            height: 45px;
            cursor: pointer;
            background: none;
            padding: 2px;
        }

        /* สำหรับช่องอัปโหลดไฟล์ */
        input[type="file"] {
            padding: 8px;
            border: 1.5px dashed #38bdf8;
            background-color: #f0f9ff;
            border-radius: 8px;
            cursor: pointer;
        }

        /* --- Radio & Checkbox Styles --- */
        .radio-group, .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding: 8px 0;
        }

        .radio-item, .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .radio-item input, .checkbox-item input {
            width: 18px;
            height: 18px;
            accent-color: #0284c7; /* เปลี่ยนสีติ๊กถูกเป็นสีฟ้าหลัก */
            cursor: pointer;
        }

        /* --- Agreement Section --- */
        .agreement {
            margin: 25px 0;
            padding: 15px;
            background-color: #f0f9ff;
            border-left: 4px solid #0284c7;
            border-radius: 4px;
        }

        /* --- Action Buttons --- */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-submit {
            background-color: #0284c7;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.2);
        }

        .btn-submit:hover {
            background-color: #0369a1;
            transform: translateY(-1px);
        }

        .btn-reset {
            background-color: #f1f5f9;
            color: #64748b;
            border: 1px solid #cbd5e1;
        }

        .btn-reset:hover {
            background-color: #e2e8f0;
            color: #334155;
        }

        /* --- Responsive Styles (รองรับมือถือ) --- */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .container {
                padding: 25px 20px;
            }

            .form-grid {
                grid-template-columns: 1fr; /* ยุบเหลือ 1 คอลัมน์บนมือถือ */
                gap: 15px;
            }

            .full-width {
                grid-column: span 1;
            }

            .btn-group {
                flex-direction: column-reverse; /* ปุ่มล้างข้อมูลจะอยู่ด้านล่างปุ่มส่งบนมือถือ */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="form-header">
            <h2>ระบบลงทะเบียนข้อมูลนักเรียน</h2>
            <p>กรุณากรอกข้อมูลให้ครบถ้วนและถูกต้องตามความเป็นจริง</p>
        </div>

        <form action="#" method="POST" enctype="multipart/form-data">
            
            <fieldset>
                <legend>1. ข้อมูลส่วนตัว</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="prefix">คำนำหน้า</label>
                        <select id="prefix" name="prefix" required>
                            <option value="" disabled selected>-- เลือกคำนำหน้า --</option>
                            <option value="นาย">นาย</option>
                            <option value="นางสาว">นางสาว</option>
                            <option value="เด็กชาย">เด็กชาย</option>
                            <option value="เด็กหญิง">เด็กหญิง</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="fullname">ชื่อ-นามสกุล</label>
                        <input type="text" id="fullname" name="fullname" placeholder="เช่น สมชาย ใจดี" required>
                    </div>
                    <div class="form-group">
                        <label for="nickname">ชื่อเล่น</label>
                        <input type="text" id="nickname" name="nickname" placeholder="เช่น บอย" required>
                    </div>
                    <div class="form-group">
                        <label for="student-id">เลขประจำตัวนักเรียน</label>
                        <input type="text" id="student-id" name="student_id" pattern="[0-9]{5}" placeholder="รหัส 5 หลัก เช่น 12345" required>
                    </div>
                    <div class="form-group">
                        <label for="birthdate">วันเดือนปีเกิด</label>
                        <input type="date" id="birthdate" name="birthdate" required>
                    </div>
                    <div class="form-group">
                        <label for="age">อายุ (ปี)</label>
                        <input type="number" id="age" name="age" min="5" max="30" placeholder="เช่น 15" required>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>2. ข้อมูลการติดต่อ</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="email">อีเมล</label>
                        <input type="email" id="email" name="email" placeholder="student@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone" name="phone" pattern="[0-9]{9,10}" placeholder="เช่น 0812345678" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="address">ที่อยู่ปัจจุบัน</label>
                        <textarea id="address" name="address" rows="3" placeholder="บ้านเลขที่, ถนน, ตำบล, อำเภอ..." required></textarea>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>3. ข้อมูลส่วนบุคคล</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label>เพศ</label>
                        <div class="radio-group">
                            <label class="radio-item">
                                <input type="radio" name="gender" value="ชาย" required> ชาย
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="gender" value="หญิง"> หญิง
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="gender" value="อื่นๆ"> อื่นๆ/ไม่ระบุ
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="religion">ศาสนา</label>
                        <select id="religion" name="religion" required>
                            <option value="" disabled selected>-- เลือกศาสนา --</option>
                            <option value="พุทธ">พุทธ</option>
                            <option value="คริสต์">คริสต์</option>
                            <option value="อิสลาม">อิสลาม</option>
                            <option value="ฮินดู">ฮินดู</option>
                            <option value="อื่นๆ">อื่นๆ</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="province">จังหวัดภูมิลำเนา</label>
                        <select id="province" name="province" required>
                            <option value="" disabled selected>-- เลือกจังหวัด --</option>
                            <option value="กรุงเทพมหานคร">กรุงเทพมหานคร</option>
                            <option value="เชียงใหม่">เชียงใหม่</option>
                            <option value="ชลบุรี">ชลบุรี</option>
                            <option value="นครราชสีมา">นครราชสีมา</option>
                            <option value="ภูเก็ต">ภูเก็ต</option>
                            </select>
                    </div>
                    <div class="form-group">
                        <label for="blood-type">กรุ๊ปเลือด</label>
                        <select id="blood-type" name="blood_type" required>
                            <option value="" disabled selected>-- เลือกกรุ๊ปเลือด --</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="O">O</option>
                            <option value="AB">AB</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>4. ความสนใจ</legend>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>งานอดิเรก (เลือกได้มากกว่า 1 ข้อ)</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item">
                                <input type="checkbox" name="hobbies[]" value="อ่านหนังสือ"> อ่านหนังสือ
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="hobbies[]" value="เล่นกีฬา/ออกกำลังกาย"> เล่นกีฬา/ออกกำลังกาย
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="hobbies[]" value="เล่นเกม"> เล่นเกม
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="hobbies[]" value="วาดภาพ/ทำงานศิลปะ"> วาดภาพ/งานศิลปะ
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="hobbies[]" value="ฟังเพลง/เล่นดนตรี"> ฟังเพลง/เล่นดนตรี
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="fav-color">สีที่ชอบ</label>
                        <input type="color" id="fav-color" name="fav_color" value="#0284c7">
                    </div>
                    <div class="form-group">
                        <label for="fav-website">เว็บไซต์ที่ชอบ (URL)</label>
                        <input type="url" id="fav-website" name="fav_website" placeholder="https://www.google.com">
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>5. ข้อมูลการศึกษา</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="education-level">ระดับชั้น</label>
                        <select id="education-level" name="education_level" required>
                            <option value="" disabled selected>-- เลือกระดับชั้น --</option>
                            <option value="มัธยมศึกษาปีที่ 1">มัธยมศึกษาปีที่ 1</option>
                            <option value="มัธยมศึกษาปีที่ 2">มัธยมศึกษาปีที่ 2</option>
                            <option value="มัธยมศึกษาปีที่ 3">มัธยมศึกษาปีที่ 3</option>
                            <option value="มัธยมศึกษาปีที่ 4">มัธยมศึกษาปีที่ 4</option>
                            <option value="มัธยมศึกษาปีที่ 5">มัธยมศึกษาปีที่ 5</option>
                            <option value="มัธยมศึกษาปีที่ 6">มัธยมศึกษาปีที่ 6</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="classroom">ห้องเรียน</label>
                        <input type="number" id="classroom" name="classroom" min="1" max="15" placeholder="เช่น 1 (หมายถึง ห้อง 1)" required>
                    </div>
                    <div class="form-group">
                        <label for="study-plan">แผนการเรียน</label>
                        <select id="study-plan" name="study_plan" required>
                            <option value="" disabled selected>-- เลือกแผนการเรียน --</option>
                            <option value="วิทยาศาสตร์-คณิตศาสตร์">วิทยาศาสตร์-คณิตศาสตร์ (วิทย์-คณิต)</option>
                            <option value="ศิลป์-คำนวณ">ศิลป์-คำนวณ</option>
                            <option value="ศิลป์-ภาษา">ศิลป์-ภาษา</option>
                            <option value="ทั่วไป/อื่นๆ">ทั่วไป/อื่นๆ</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="gpa">เกรดเฉลี่ยสะสม (GPAX)</label>
                        <input type="number" id="gpa" name="gpa" step="0.01" min="0.00" max="4.00" placeholder="เช่น 3.50" required>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>6. การอัปโหลดไฟล์</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="avatar-img">รูปภาพประจำตัว (.jpg, .png)</label>
                        <input type="file" id="avatar-img" name="avatar_img" accept="image/*" required>
                    </div>
                    <div class="form-group">
                        <label for="doc-file">เอกสารเพิ่มเติม (.pdf, .zip)</label>
                        <input type="file" id="doc-file" name="doc_file" accept=".pdf,.zip">
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>7. ความคิดเห็นเพิ่มเติม</legend>
                <div class="form-group">
                    <label for="comments">แสดงความคิดเห็น / ข้อมูลเพิ่มเติม</label>
                    <textarea id="comments" name="comments" rows="4" placeholder="กรอกข้อความที่ท่านต้องการแนะนำหรือแจ้งรายละเอียดเพิ่มเติม..."></textarea>
                </div>
            </fieldset>

            <div class="agreement">
                <label class="checkbox-item">
                    <input type="checkbox" name="terms_agreement" required>
                    <span>ฉันยืนยันว่าข้อมูลทั้งหมดที่ระบุข้างต้นเป็นความจริงทุกประการ และยอมรับเงื่อนไขการใช้งานระบบ</span>
                </label>
            </div>

            <div class="btn-group">
                <button type="reset" class="btn btn-reset">ล้างข้อมูล</button>
                <button type="submit" class="btn btn-submit">ส่งข้อมูล</button>
            </div>

        </form>
    </div>

</body>
</html>
