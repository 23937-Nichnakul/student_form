<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกข้อมูลนักเรียน</title>
    <!-- นำเข้าฟอนต์ Prompt -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- General Reset & Base Style --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body {
            /* พื้นหลังสีฟ้าพาสเทลละมุน สบายตา */
            background-color: #f0f7ff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        /* จัดกรอบฟอร์มหลัก */
        .wrapper {
            width: 100%;
            max-width: 850px;
        }

        /* --- Header Form --- */
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header h2 {
            color: #0369a1;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-header p {
            color: #64748b;
            font-size: 15px;
        }

        /* --- แยกแต่ละ Section เป็นการ์ดลอย (แก้ปัญหาความโล่ง) --- */
        fieldset {
            border: none;
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(14, 165, 233, 0.05);
            margin-bottom: 25px;
            border: 1px solid #e0f2fe;
        }

        legend {
            font-size: 18px;
            font-weight: 600;
            color: #0284c7;
            background: #e0f2fe;
            padding: 6px 18px;
            border-radius: 30px;
            margin-bottom: 25px;
            display: inline-block;
        }

        /* จัด Layout คอลัมน์ */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .full-width {
            grid-column: span 2;
        }

        /* --- Form Controls & Inputs --- */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            color: #334155;
            font-weight: 600;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="url"],
        select,
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            color: #1e293b;
            background-color: #f8fafc;
            outline: none;
            transition: all 0.2s ease;
        }

        /* เอฟเฟกต์นุ่มนวลตอนกดพิมพ์ */
        input:focus,
        select:focus,
        textarea:focus {
            border-color: #38bdf8;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }

        /* ปรับแต่งช่องเลือกสี */
        input[type="color"] {
            -webkit-appearance: none;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            width: 100%;
            height: 50px;
            cursor: pointer;
            background: #f8fafc;
            padding: 6px;
        }
        ::-webkit-color-swatch {
            border: none;
            border-radius: 8px;
        }

        /* ช่องอัปโหลดไฟล์แบบนุ่มนวล */
        input[type="file"] {
            padding: 10px;
            border: 2px dashed #cbd5e1;
            background-color: #f8fafc;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        input[type="file"]:hover {
            background-color: #f0f9ff;
            border-color: #38bdf8;
        }

        /* --- ปรับแต่งตัวเลือก (Radio/Checkbox) ให้เป็นปุ่มการ์ดนุ่มนวล ไม่แข็ง --- */
        .radio-group, .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            padding: 4px 0;
        }

        .custom-option {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
            color: #475569;
            font-weight: 500;
            text-align: center;
        }

        /* ซ่อนกล่องติ๊กดีฟอลต์ที่ดูแข็ง */
        .custom-option input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        /* เมื่อเอาเมาส์ไปชี้ตัวเลือก */
        .custom-option:hover {
            background-color: #f0f9ff;
            border-color: #bae6fd;
            color: #0284c7;
        }

        /* เมื่อกดเลือก (Active State) เปลี่ยนสีเป็นการ์ดฟ้าละมุนทันที */
        .custom-option:has(input:checked) {
            background-color: #e0f2fe;
            border-color: #0284c7;
            color: #0369a1;
            font-weight: 600;
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.1);
        }

        /* --- ข้อตกลงยินยอม --- */
        .agreement {
            margin: 30px 0;
            padding: 20px;
            background-color: #ffffff;
            border: 2px solid #e0f2fe;
            border-radius: 16px;
            display: flex;
            align-items: center;
        }
        
        .agreement-label {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 14px;
            color: #0369a1;
            font-weight: 500;
        }

        .agreement-label input {
            width: 20px;
            height: 20px;
            accent-color: #0284c7;
            cursor: pointer;
        }

        /* --- Action Buttons --- */
        .btn-group {
            display: flex;
            gap: 16px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-submit {
            background-color: #0284c7;
            color: #ffffff;
            box-shadow: 0 4px 14px rgba(2, 132, 199, 0.2);
        }

        .btn-submit:hover {
            background-color: #0369a1;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(2, 132, 199, 0.3);
        }

        .btn-reset {
            background-color: #ffffff;
            color: #64748b;
            border: 2px solid #e2e8f0;
        }

        .btn-reset:hover {
            background-color: #f1f5f9;
            color: #334155;
            border-color: #cbd5e1;
            transform: translateY(-2px);
        }

        /* --- Responsive Styles (มือถือ) --- */
        @media (max-width: 768px) {
            body {
                padding: 30px 12px;
            }

            .form-header h2 {
                font-size: 26px;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .full-width {
                grid-column: span 1;
            }

            fieldset {
                padding: 20px;
                margin-bottom: 20px;
            }

            .radio-group, .checkbox-group {
                grid-template-columns: repeat(2, 1fr); /* บนมือถือแบ่งเป็น 2 คอลัมน์ให้กดง่าย */
            }

            .btn-group {
                flex-direction: column-reverse;
                gap: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- หัวข้อฟอร์ม -->
        <div class="form-header">
            <h2>ระบบลงทะเบียนข้อมูลนักเรียน</h2>
            <p>กรุณากรอกรายละเอียดให้ครบถ้วนเพื่อทำการบันทึกประวัติ</p>
        </div>

        <form action="#" method="POST" enctype="multipart/form-data">
            
            <!-- Section 1: ข้อมูลส่วนตัว -->
            <fieldset>
                <legend>👤 1. ข้อมูลส่วนตัว</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="prefix">คำนำหน้า</label>
                        <select id="prefix" name="prefix" required>
                            <option value="" disabled selected>-- เลือกคำนำหน้า --</option>
                            <option value="นาย">นาย</option>
                            <option value="นางสาว">นางสาว</option>
                            <option value="เด็กชาย">เด็กชาย</option>
                            <option value="เด็กหญิง">เด็กหญิง</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="fullname">ชื่อ-นามสกุล</label>
                        <input type="text" id="fullname" name="fullname" placeholder="เช่น สมชาย ใจดี" required>
                    </div>
                    <div class="form-group">
                        <label for="nickname">ชื่อเล่น</label>
                        <input type="text" id="nickname" name="nickname" placeholder="เช่น บอย" required>
                    </div>
                    <div class="form-group">
                        <label for="student-id">เลขประจำตัวนักเรียน</label>
                        <input type="text" id="student-id" name="student_id" pattern="[0-9]{5}" placeholder="รหัส 5 หลัก เช่น 12345" required>
                    </div>
                    <div class="form-group">
                        <label for="birthdate">วันเดือนปีเกิด</label>
                        <input type="date" id="birthdate" name="birthdate" required>
                    </div>
                    <div class="form-group">
                        <label for="age">อายุ (ปี)</label>
                        <input type="number" id="age" name="age" min="5" max="30" placeholder="เช่น 15" required>
                    </div>
                </div>
            </fieldset>

            <!-- Section 2: ข้อมูลการติดต่อ -->
            <fieldset>
                <legend>📞 2. ข้อมูลการติดต่อ</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="email">อีเมล</label>
                        <input type="email" id="email" name="email" placeholder="student@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone" name="phone" pattern="[0-9]{9,10}" placeholder="เช่น 0812345678" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="address">ที่อยู่ปัจจุบัน</label>
                        <textarea id="address" name="address" rows="3" placeholder="ระบุบ้านเลขที่, ถนน, ตำบล, อำเภอ..." required></textarea>
                    </div>
                </div>
            </fieldset>

            <!-- Section 3: ข้อมูลส่วนบุคคล -->
            <fieldset>
                <legend>🧬 3. ข้อมูลส่วนบุคคล</legend>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>เพศ</label>
                        <div class="radio-group">
                            <label class="custom-option">
                                <input type="radio" name="gender" value="ชาย" required> ชาย
                            </label>
                            <label class="custom-option">
                                <input type="radio" name="gender" value="หญิง"> หญิง
                            </label>
                            <label class="custom-option">
                                <input type="radio" name="gender" value="อื่นๆ"> อื่นๆ / ไม่ระบุ
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="religion">ศาสนา</label>
                        <select id="religion" name="religion" required>
                            <option value="" disabled selected>-- เลือกศาสนา --</option>
                            <option value="พุทธ">พุทธ</option>
                            <option value="คริสต์">คริสต์</option>
                            <option value="อิสลาม">อิสลาม</option>
                            <option value="ฮินดู">ฮินดู</option>
                            <option value="อื่นๆ">อื่นๆ</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="province">จังหวัดภูมิลำเนา</label>
                        <select id="province" name="province" required>
                            <option value="" disabled selected>-- เลือกจังหวัด --</option>
                            <option value="กรุงเทพมหานคร">กรุงเทพมหานคร</option>
                            <option value="เชียงใหม่">เชียงใหม่</option>
                            <option value="ชลบุรี">ชลบุรี</option>
                            <option value="นครราชสีมา">นครราชสีมา</option>
                            <option value="ภูเก็ต">ภูเก็ต</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>กรุ๊ปเลือด</label>
                        <div class="radio-group">
                            <label class="custom-option">
                                <input type="radio" name="blood_type" value="A" required> A
                            </label>
                            <label class="custom-option">
                                <input type="radio" name="blood_type" value="B"> B
                            </label>
                            <label class="custom-option">
                                <input type="radio" name="blood_type" value="O"> O
                            </label>
                            <label class="custom-option">
                                <input type="radio" name="blood_type" value="AB"> AB
                            </label>
                        </div>
                    </div>
                </div>
            </fieldset>

            <!-- Section 4: ความสนใจ -->
            <fieldset>
                <legend>🎨 4. ความสนใจ</legend>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>งานอดิเรก (เลือกได้มากกว่า 1 ข้อ)</label>
                        <div class="checkbox-group">
                            <label class="custom-option">
                                <input type="checkbox" name="hobbies[]" value="อ่านหนังสือ"> อ่านหนังสือ
                            </label>
                            <label class="custom-option">
                                <input type="checkbox" name="hobbies[]" value="เล่นกีฬา"> เล่นกีฬา
                            </label>
                            <label class="custom-option">
                                <input type="checkbox" name="hobbies[]" value="เล่นเกม"> เล่นเกม
                            </label>
                            <label class="custom-option">
                                <input type="checkbox" name="hobbies[]" value="วาดภาพ"> วาดภาพ
                            </label>
                            <label class="custom-option">
                                <input type="checkbox" name="hobbies[]" value="ดนตรี"> ฟังเพลง/ดนตรี
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="fav-color">สีที่ชอบ</label>
                        <input type="color" id="fav-color" name="fav_color" value="#0284c7">
                    </div>
                    <div class="form-group">
                        <label for="fav-website">เว็บไซต์ที่ชอบ (URL)</label>
                        <input type="url" id="fav-website" name="fav_website" placeholder="https://www.google.com">
                    </div>
                </div>
            </fieldset>

            <!-- Section 5: ข้อมูลการศึกษา -->
            <fieldset>
                <legend>🎓 5. ข้อมูลการศึกษา</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="education-level">ระดับชั้น</label>
                        <select id="education-level" name="education_level" required>
                            <option value="" disabled selected>-- เลือกระดับชั้น --</option>
                            <option value="มัธยมศึกษาปีที่ 1">มัธยมศึกษาปีที่ 1</option>
                            <option value="มัธยมศึกษาปีที่ 2">มัธยมศึกษาปีที่ 2</option>
                            <option value="มัธยมศึกษาปีที่ 3">มัธยมศึกษาปีที่ 3</option>
                            <option value="มัธยมศึกษาปีที่ 4">มัธยมศึกษาปีที่ 4</option>
                            <option value="มัธยมศึกษาปีที่ 5">มัธยมศึกษาปีที่ 5</option>
                            <option value="มัธยมศึกษาปีที่ 6">มัธยมศึกษาปีที่ 6</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="classroom">ห้องเรียน</label>
                        <input type="number" id="classroom" name="classroom" min="1" max="15" placeholder="เช่น 1" required>
                    </div>
                    <div class="form-group">
                        <label for="study-plan">แผนการเรียน</label>
                        <select id="study-plan" name="study_plan" required>
                            <option value="" disabled selected>-- เลือกแผนการเรียน --</option>
                            <option value="วิทยาศาสตร์-คณิตศาสตร์">วิทยาศาสตร์-คณิตศาสตร์</option>
                            <option value="ศิลป์-คำนวณ">ศิลป์-คำนวณ</option>
                            <option value="ศิลป์-ภาษา">ศิลป์-ภาษา</option>
                            <option value="ทั่วไป/อื่นๆ">ทั่วไป/อื่นๆ</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="gpa">เกรดเฉลี่ยสะสม (GPAX)</label>
                        <input type="number" id="gpa" name="gpa" step="0.01" min="0.00" max="4.00" placeholder="เช่น 3.50" required>
                    </div>
                </div>
            </fieldset>

            <!-- Section 6: การอัปโหลดไฟล์ -->
            <fieldset>
                <legend>📁 6. การอัปโหลดไฟล์</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="avatar-img">รูปภาพประจำตัว (.jpg, .png)</label>
                        <input type="file" id="avatar-img" name="avatar_img" accept="image/*" required>
                    </div>
                    <div class="form-group">
                        <label for="doc-file">เอกสารเพิ่มเติม (.pdf, .zip)</label>
                        <input type="file" id="doc-file" name="doc_file" accept=".pdf,.zip">
                    </div>
                </div>
            </fieldset>

            <!-- Section 7: ความคิดเห็นเพิ่มเติม -->
            <fieldset>
                <legend>💬 7. ความคิดเห็นเพิ่มเติม</legend>
                <div class="form-group">
                    <label for="comments">แสดงความคิดเห็น / ข้อมูลเพิ่มเติม</label>
                    <textarea id="comments" name="comments" rows="4" placeholder="กรอกข้อความที่ต้องการแจ้งรายละเอียดเพิ่มเติม..."></textarea>
                </div>
            </fieldset>

            <!-- Section 8: ยืนยันข้อมูล -->
            <div class="agreement">
                <label class="agreement-label">
                    <input type="checkbox" name="terms_agreement" required>
                    <span>ฉันยอมรับว่าข้อมูลทั้งหมดถูกต้องตรงตามความเป็นจริงและยอมรับเงื่อนไขการใช้งาน</span>
                </label>
            </div>

            <!-- ปุ่มดำเนินการ -->
            <div class="btn-group">
                <button type="reset" class="btn btn-reset">ล้างข้อมูล</button>
                <button type="submit" class="btn btn-submit">ส่งข้อมูลนักเรียน</button>
            </div>

        </form>
    </div>

</body>
</html>
